name = "elide-container-registry"

workers_dev = false
preview_urls = false
routes = [{ pattern = "registry.elide.cloud", custom_domain = true }]

main = "./index.ts"
compatibility_date = "2024-09-09"
compatibility_flags = ["nodejs_compat"]

[observability.logs]
enabled = true
[observability.traces]
enabled = true

## Production
[env.production]
r2_buckets = [{ binding = "REGISTRY", bucket_name = "elide-container-registry-prod" }]

[env.production.vars]
JWT_REGISTRY_TOKENS_PUBLIC_KEY = ""

REGISTRIES_JSON = "[{ \"registry\": \"https://ghcr.io\", \"password_env\": \"GHCR_TOKEN\", \"username\": \"sgammon\", \"namespace_prefix\": \"elide-dev\" }]"
USERNAME = "engineering"
READONLY_USERNAME = "readonly"

# Required secrets (set via `wrangler secret put --env production`):
#   PASSWORD            - auth password for push access
#   READONLY_PASSWORD   - auth password for read-only access
#   GHCR_TOKEN          - GitHub PAT for ghcr.io pull-through

## Dev - For local dev using `npx wrangler dev`
[env.dev]
r2_buckets = [{ binding = "REGISTRY", bucket_name = "elide-container-registry-dev" }]
[env.dev.vars]
REGISTRIES_JSON = "[{ \"registry\": \"https://ghcr.io\", \"password_env\": \"GHCR_TOKEN\", \"username\": \"sgammon\", \"namespace_prefix\": \"elide-dev\" }]"
USERNAME = "engineering"
READONLY_USERNAME = "readonly"

# Required secrets for local dev (set in .dev.vars):
#   PASSWORD            - auth password for push access
#   READONLY_PASSWORD   - auth password for read-only access
#   GHCR_TOKEN          - GitHub PAT for ghcr.io pull-through
